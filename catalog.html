<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistīvo tehnoloģiju katalogs</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    header {
      background: #1e3a8a;
      color: white;
      padding: 24px;
    }
    main {
      padding: 24px;
      max-width: 1200px;
      margin: auto;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    input, select {
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      margin-top: 0;
      font-size: 18px;
      color: #1e3a8a;
    }
    .tag {
      display: inline-block;
      background: #e0e7ff;
      color: #1e3a8a;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin: 3px 3px 3px 0;
    }
    a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <header>
    <h1>Asistīvo tehnoloģiju katalogs</h1>
    <p>Filtrējams katalogs izglītības vajadzībām</p>
  </header>

  <main>
    <div class="filters">
      <input id="search" type="text" placeholder="Meklēt pēc nosaukuma vai apraksta..." />

      <select id="typeFilter">
        <option value="">Visi tipi</option>
      </select>

      <select id="functionFilter">
        <option value="">Visas funkcijas</option>
      </select>

      <select id="supplierFilter">
        <option value="">Visi piegādātāji</option>
      </select>
    </div>

    <p id="count"></p>

    <div id="catalog" class="grid"></div>
  </main>

  <script>
    let products = [];

    async function loadCatalog() {
      const response = await fetch("data/catalog.json");
      products = await response.json();

      fillFilters();
      renderCatalog(products);
    }

    function fillFilters() {
      fillSelect("typeFilter", "tips");
      fillSelect("functionFilter", "funkcija");
      fillSelect("supplierFilter", "piegadatajs");
    }

    function fillSelect(selectId, field) {
      const select = document.getElementById(selectId);
      const values = [...new Set(products.map(p => p[field]).filter(Boolean))].sort();

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function renderCatalog(items) {
      const catalog = document.getElementById("catalog");
      const count = document.getElementById("count");

      catalog.innerHTML = "";
      count.textContent = `Atrasti ieraksti: ${items.length}`;

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h2>${item.nosaukums}</h2>
          <p><strong>Tips:</strong> ${item.tips || ""}</p>
          <p><strong>Funkcija:</strong> ${item.funkcija || ""}</p>
          <p><strong>Mērķgrupa:</strong> ${item.merkgrupa || ""}</p>
          <p><strong>Piegādātājs:</strong> ${item.piegadatajs || ""}</p>
          <p>${item.apraksts_lv || ""}</p>
          <div>
            ${item.viaa_atbilstiba ? `<span class="tag">VIAA: ${item.viaa_atbilstiba}</span>` : ""}
            ${item.vtpc_statuss ? `<span class="tag">VTPC: ${item.vtpc_statuss}</span>` : ""}
          </div>
          ${item.produkta_saite ? `<p><a href="${item.produkta_saite}" target="_blank" rel="noopener">Atvērt produkta lapu</a></p>` : ""}
        `;

        catalog.appendChild(card);
      });
    }

    function applyFilters() {
      const search = document.getElementById("search").value.toLowerCase();
      const type = document.getElementById("typeFilter").value;
      const func = document.getElementById("functionFilter").value;
      const supplier = document.getElementById("supplierFilter").value;

      const filtered = products.filter(item => {
        const text = `${item.nosaukums} ${item.apraksts_lv} ${item.merkgrupa}`.toLowerCase();

        return (
          text.includes(search) &&
          (!type || item.tips === type) &&
          (!func || item.funkcija === func) &&
          (!supplier || item.piegadatajs === supplier)
        );
      });

      renderCatalog(filtered);
    }

    document.getElementById("search").addEventListener("input", applyFilters);
    document.getElementById("typeFilter").addEventListener("change", applyFilters);
    document.getElementById("functionFilter").addEventListener("change", applyFilters);
    document.getElementById("supplierFilter").addEventListener("change", applyFilters);

    loadCatalog();
  </script>
</body>
</html>
