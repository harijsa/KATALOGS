<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistīvo tehnoloģiju katalogs</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }

    header {
      background: white;
      padding: 32px 24px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo {
      max-width: 720px;
      width: 100%;
      height: auto;
      margin-bottom: 24px;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
      text-align: center;
    }

    h1 {
      color: #1e3a8a;
      margin-bottom: 12px;
    }

    .button {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 22px;
      background: #1e3a8a;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <header>
    <img src="assets/images/logo.jpeg" alt="Logo" class="header-logo" />
  </header>

  <main>
    <h1>Asistīvo tehnoloģiju katalogs</h1>
    <p>
      Katalogs paredzēts asistīvo tehnoloģiju, programmatūras, pakalpojumu un pieejamības risinājumu apkopošanai izglītības vajadzībām.
    </p>

    <a class="button" href="catalog.html">Atvērt katalogu</a>
  </main>
</body>
</html>
